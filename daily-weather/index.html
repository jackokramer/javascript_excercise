<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="weather-widget">
            <div class="weather-header">
                <div class="location">
                    <span class="city">San Francisco</span>
                    <span class="country">US</span>
                </div>
                <div class="date-label">Friday, Mar 13</div>
            </div>

            <div class="weather-main">
                <div class="temp-block">
                    <span class="temp-value">64</span>
                    <span class="temp-unit">°F</span>
                </div>
                <div class="condition-block">
                    <div class="condition-icon">⛅</div>
                    <div class="condition-text">Partly Cloudy</div>
                </div>
            </div>

            <div class="weather-stats">
                <div class="stat">
                    <span class="stat-label">Humidity</span>
                    <span class="stat-value">72%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Wind</span>
                    <span class="stat-value">14 mph</span>
                </div>
                <div class="stat">
                    <span class="stat-label">UV Index</span>
                    <span class="stat-value">3</span>
                </div>
            </div>

            <div class="forecast-row">
                <div class="forecast-day">
                    <span class="day-name">SAT</span>
                    <span class="day-icon">🌧️</span>
                    <span class="day-temp">58°</span>
                </div>
                <div class="forecast-day">
                    <span class="day-name">SUN</span>
                    <span class="day-icon">☀️</span>
                    <span class="day-temp">71°</span>
                </div>
                <div class="forecast-day">
                    <span class="day-name">MON</span>
                    <span class="day-icon">🌤️</span>
                    <span class="day-temp">68°</span>
                </div>
                <div class="forecast-day active">
                    <span class="day-name">TUE</span>
                    <span class="day-icon">⛈️</span>
                    <span class="day-temp">55°</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
